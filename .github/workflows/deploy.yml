# .github/workflows/deploy.yml 
# THIS IS AN EXAMPLE AND NOT REAL.
name: Deploy to prod
on:
  push:
    tags: ['v*']          # run on version tags
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Build Docker image and push to registry
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      # 3️⃣ SSH into prod host (or use a deploy runner) and restart stack
      - name: Deploy stack
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem user@prod-server "\
            cd /opt/chess-trainer && \
            docker compose pull api && \
            docker compose up -d --build api nginx db"

      # 4️⃣ Run DB migrations
      - name: Run Alembic migrations
        run: |
          ssh -i key.pem user@prod-server "\
            cd /opt/chess-trainer && \
            docker compose run --rm api alembic -c backend/app/migrations/alembic.ini upgrade head"

      # 5️⃣ (Optional) Run opening‑data seed if the release includes new data
      - name: Seed openings (idempotent)
        if: contains(github.ref_name, 'add-openings')   # or any condition you choose
        run: |
          ssh -i key.pem user@prod-server "\
            cd /opt/chess-trainer && \
            docker compose run --rm api python -m app.seed_openings"
