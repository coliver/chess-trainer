services:
  db:
    image: postgres:16
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api:
    build: .
    volumes:
      - .:/app
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "8000"
    depends_on:
      - db
    command: sh -c "PYTHONPATH=/app alembic -c backend/app/migrations/alembic.ini upgrade head && uvicorn backend.app.app:app --host=0.0.0.0 --port=8000 --reload"

  nginx:
    image: nginx:1.27
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./letsencrypt:/etc/nginx/certs:ro
volumes:
  pgdata:
