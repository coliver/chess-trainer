services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: chess_trainer
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://chess:chess@db:5432/chess_trainer
    expose:
      - "8000"
    depends_on:
      - db
    command: sh -c "PYTHONPATH=/app alembic -c backend/app/migrations/alembic.ini upgrade head && uvicorn backend.app.app:app --host=0.0.0.0 --port=8000"

  nginx:
    image: nginx:1.27
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./letsencrypt:/etc/nginx/certs:ro
volumes:
  pgdata:
