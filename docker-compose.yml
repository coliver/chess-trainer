services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: chess_trainer
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://chess:chess@db:5432/chess_trainer
    expose:
      - "8000"
    depends_on:
      - db

  nginx:
    image: nginx:1.27
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./letsencrypt:/etc/nginx/certs:ro
volumes:
  pgdata:
