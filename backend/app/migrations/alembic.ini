[alembic]
script_location = backend/app/migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatters]
keys = generic

[logger_sqlalchemy]
level = INFO
handlers = console
qualname = sqlalchemy
propagate = 0

[logger_alembic]
level = INFO
handlers = console
qualname = alembic
propagate = 0

[logger_root]
level = INFO
handlers = console
qualname = root

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
